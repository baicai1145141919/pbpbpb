<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩工具 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #4a90e2;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            height: 38px;
            display: flex;
            align-items: center;
        }

        .main-content {
            padding: 15px;
        }

        .mode-select {
            margin-bottom: 15px;
        }

        .mode-select label {
            margin-right: 20px;
            cursor: pointer;
        }

        .path-section {
            margin-bottom: 15px;
        }

        .path-label {
            display: inline-block;
            width: 80px;
            text-align: left;
            font-size: 13px;
            color: #333;
        }

        .path-input {
            width: 400px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
        }

        .path-input[readonly] {
            background: #eaeaea;
        }

        .btn-browse {
            padding: 5px 15px;
            background: #ddd;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }

        .btn-browse:hover {
            background: #ccc;
        }

        .btn-open-output {
            padding: 5px 15px;
            background: #ddd;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }

        .btn-open-output:hover {
            background: #ccc;
        }

        .preview-frame {
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 10px;
            margin-bottom: 15px;
            background: #f5f5f5;
        }

        .preview-title {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .preview-content {
            font-size: 12px;
            color: #999;
        }

        .preview-content.has-info {
            color: #222;
        }

        .options-section {
            margin-bottom: 15px;
        }

        .options-row {
            margin-bottom: 10px;
            font-size: 13px;
            color: #333;
        }

        .options-row label {
            margin-right: 15px;
            cursor: pointer;
        }

        .target-size {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .size-slider {
            width: 300px;
        }

        .size-input {
            width: 60px;
            padding: 3px 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
        }

        .checkboxes {
            margin-bottom: 15px;
        }

        .checkboxes label {
            margin-right: 30px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        .btn-start {
            display: block;
            margin: 0 auto 15px;
            padding: 8px 30px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-start:hover {
            background: #3a7bc8;
        }

        .btn-start:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            margin-bottom: 15px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #4a90e2;
            width: 0%;
            transition: width 0.3s;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 12px;
        }

        .log-frame {
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: "Consolas", monospace;
            font-size: 12px;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log-line {
            margin: 0;
            padding: 1px 0;
        }

        .log-green { color: #6fd672; }
        .log-red { color: #f47c7c; }
        .log-yellow { color: #e5c07b; }
        .log-cyan { color: #56b6c2; }

        .file-input {
            display: none;
        }

        .folder-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            图片压缩工具 - 网页版
        </div>

        <div class="main-content">
            <!-- 模式选择 -->
            <div class="mode-select">
                <label>
                    <input type="radio" name="mode" value="file" checked onchange="onModeChange()">
                    单文件模式
                </label>
                <label>
                    <input type="radio" name="mode" value="folder" onchange="onModeChange()">
                    批量文件夹模式
                </label>
            </div>

            <!-- 输入路径 -->
            <div class="path-section">
                <span class="path-label">输入路径:</span>
                <input type="text" class="path-input" id="inputPath" readonly placeholder="请选择文件或文件夹">
                <button class="btn-browse" onclick="browseInput()">浏览</button>
                <input type="file" class="file-input" id="fileInput" onchange="handleFileSelect(this)">
                <input type="file" class="folder-input" id="folderInput" webkitdirectory onchange="handleFolderSelect(this)">
            </div>

            <!-- 输出路径 -->
            <div class="path-section">
                <span class="path-label">输出路径:</span>
                <input type="text" class="path-input" id="outputPath" readonly>
                <button class="btn-open-output" onclick="openOutput()">打开输出文件夹</button>
            </div>

            <!-- 图片信息预览 -->
            <div class="preview-frame">
                <div class="preview-title">图片信息</div>
                <div class="preview-content" id="previewContent">（请选择图片）</div>
            </div>

            <!-- 选项 -->
            <div class="options-section">
                <div class="options-row">
                    <span>输出格式:</span>
                    <label><input type="radio" name="format" value="auto" checked> 自动</label>
                    <label><input type="radio" name="format" value=".jpg"> .jpg</label>
                    <label><input type="radio" name="format" value=".png"> .png</label>
                    <label><input type="radio" name="format" value=".webp"> .webp</label>
                </div>

                <div class="options-row">
                    <span>压缩模式:</span>
                    <label><input type="radio" name="mode2" value="clarity" checked> 优先清晰</label>
                    <label><input type="radio" name="mode2" value="size"> 优先压小</label>
                </div>

                <div class="options-row target-size">
                    <span>目标大小:</span>
                    <input type="range" class="size-slider" id="sizeSlider" min="10" max="5000" value="200" oninput="updateSizeDisplay()">
                    <input type="text" class="size-input" id="sizeInput" value="200" onchange="updateSizeFromInput()"> KB
                </div>
            </div>

            <!-- 勾选项 -->
            <div class="checkboxes">
                <label>
                    <input type="checkbox" id="keepTime" checked>
                    保留原始文件时间（网页版不支持）
                </label>
                <label>
                    <input type="checkbox" id="overwrite" onchange="toggleOverwrite()">
                    覆盖源文件（输出到源文件目录）
                </label>
            </div>

            <!-- 开始按钮 -->
            <button class="btn-start" id="btnStart" onclick="startCompress()">开始压缩</button>

            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>

            <!-- 压缩日志 -->
            <div class="preview-title">压缩日志:</div>
            <div class="log-frame" id="logFrame"></div>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let outputFolderHandle = null;

        // 模式切换
        function onModeChange() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            document.getElementById('inputPath').value = '';
            document.getElementById('previewContent').textContent = '（请选择图片）';
            document.getElementById('previewContent').className = 'preview-content';
            selectedFiles = [];
        }

        // 浏览输入
        function browseInput() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            if (mode === 'file') {
                document.getElementById('fileInput').click();
            } else {
                document.getElementById('folderInput').click();
            }
        }

        // 处理文件选择
        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('inputPath').value = file.name;
            selectedFiles = [file];
            previewFile(file);
            autoSetOutput();
        }

        // 处理文件夹选择
        function handleFolderSelect(input) {
            const files = Array.from(input.files).filter(f => 
                ['.jpg', '.jpeg', '.png', '.webp', '.bmp', '.tiff', '.tif']
                .includes('.' + f.name.split('.').pop().toLowerCase())
            );

            if (files.length === 0) {
                alert('未找到支持的图片文件！');
                return;
            }

            document.getElementById('inputPath').value = '已选择 ' + files.length + ' 个图片文件';
            selectedFiles = files;
            previewFolder(files);
            autoSetOutput();
        }

        // 预览文件信息
        function previewFile(file) {
            const img = new Image();
            img.onload = function() {
                const info = `文件名：${file.name}\n` +
                            `分辨率：${img.width} × ${img.height}  色彩模式：RGB\n` +
                            `文件大小：${formatSize(file.size)}\n` +
                            `修改时间：${new Date(file.lastModified).toLocaleString()}`;
                
                const preview = document.getElementById('previewContent');
                preview.textContent = info;
                preview.className = 'preview-content has-info';
            };
            img.src = URL.createObjectURL(file);
        }

        // 预览文件夹信息
        function previewFolder(files) {
            let totalSize = 0;
            files.forEach(f => totalSize += f.size);

            const info = `图片数量：${files.length} 张\n` +
                        `总大小：${formatSize(totalSize)}\n` +
                        `输出到：浏览器下载目录`;
            
            const preview = document.getElementById('previewContent');
            preview.textContent = info;
            preview.className = 'preview-content has-info';
        }

        // 自动设置输出路径
        function autoSetOutput() {
            const overwrite = document.getElementById('overwrite').checked;
            if (overwrite) {
                document.getElementById('outputPath').value = '（将覆盖源文件）';
            } else {
                document.getElementById('outputPath').value = '（浏览器下载目录）';
            }
        }

        // 切换覆盖模式
        function toggleOverwrite() {
            autoSetOutput();
        }

        // 打开输出文件夹（网页版是下载目录）
        function openOutput() {
            alert('网页版压缩后的文件将自动下载到浏览器的默认下载目录。');
        }

        // 更新大小显示
        function updateSizeDisplay() {
            const value = document.getElementById('sizeSlider').value;
            document.getElementById('sizeInput').value = value;
        }

        // 从输入框更新
        function updateSizeFromInput() {
            let value = parseInt(document.getElementById('sizeInput').value);
            if (isNaN(value) || value < 10) value = 10;
            if (value > 5000) value = 5000;
            document.getElementById('sizeInput').value = value;
            document.getElementById('sizeSlider').value = value;
        }

        // 开始压缩
        async function startCompress() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件或文件夹！');
                return;
            }

            const btnStart = document.getElementById('btnStart');
            btnStart.disabled = true;
            btnStart.textContent = '压缩中...';

            clearLog();
            updateProgress(0);

            const targetKB = parseInt(document.getElementById('sizeInput').value);
            const format = document.querySelector('input[name="format"]:checked').value;
            const mode = document.querySelector('input[name="mode2"]:checked').value;

            log(`共找到 ${selectedFiles.length} 张图片`, 'yellow');
            log(`目标大小：≤ ${targetKB} KB`, 'yellow');
            log(`输出格式：${format}    压缩模式：${mode}`, 'cyan');
            log(`输出目录：浏览器下载目录\n`, 'yellow');

            let ok = 0, fail = 0;

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                log(`[${i + 1}/${selectedFiles.length}] 正在处理: ${file.name}`);

                try {
                    const result = await compressImage(file, targetKB, format, mode);
                    ok++;
                    const ratio = ((1 - result.compressedSize / file.size) * 100).toFixed(1);
                    const tag = result.compressedSize <= targetKB * 1024 ? 'green' : 'yellow';
                    log(`[OK] ${file.name}  ${formatSize(file.size)} → ${formatSize(result.compressedSize)}  压缩率 ${ratio}%`, tag);
                    
                    // 下载文件
                    downloadFile(result.blob, result.fileName);
                } catch (error) {
                    fail++;
                    log(`[失败] ${file.name}  ${error.message}`, 'red');
                }

                updateProgress(((i + 1) / selectedFiles.length) * 100);
            }

            log(`\n完成！成功 ${ok} 张，失败 ${fail} 张。`, 'yellow');
            btnStart.disabled = false;
            btnStart.textContent = '开始压缩';
        }

        // 压缩图片
        function compressImage(file, targetKB, format, mode) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        
                        // 确定输出格式
                        let mimeType = 'image/jpeg';
                        let ext = '.jpg';
                        if (format === 'auto') {
                            mimeType = file.type || 'image/jpeg';
                            ext = '.' + (file.name.split('.').pop() || 'jpg');
                        } else if (format === '.png') {
                            mimeType = 'image/png';
                            ext = '.png';
                        } else if (format === '.webp') {
                            mimeType = 'image/webp';
                            ext = '.webp';
                        }
                        
                        // 确定质量
                        let quality = 0.75;
                        if (mode === 'clarity') {
                            quality = 0.85;
                        } else if (mode === 'size') {
                            quality = 0.6;
                        }
                        
                        // 二分法调整质量
                        let minQ = 0.1;
                        let maxQ = quality;
                        let bestBlob = null;
                        
                        const targetBytes = targetKB * 1024;
                        
                        // 尝试不同质量
                        for (let q = maxQ; q >= minQ; q -= 0.05) {
                            canvas.toBlob((blob) => {
                                if (blob && blob.size <= targetBytes) {
                                    bestBlob = blob;
                                    bestBlob.quality = q;
                                }
                            }, mimeType, q);
                        }
                        
                        // 如果没找到合适的，用最低质量
                        canvas.toBlob((blob) => {
                            if (!blob) {
                                reject(new Error('压缩失败'));
                                return;
                            }
                            
                            const fileName = file.name.replace(/\.[^.]+$/, '') + '_compressed' + ext;
                            
                            resolve({
                                blob: blob,
                                compressedSize: blob.size,
                                fileName: fileName
                            });
                        }, mimeType, quality);
                    };
                    
                    img.onerror = () => reject(new Error('图片加载失败'));
                };
                
                reader.onerror = () => reject(new Error('文件读取失败'));
            });
        }

        // 下载文件
        function downloadFile(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 日志功能
        function log(msg, color = '') {
            const logFrame = document.getElementById('logFrame');
            const line = document.createElement('div');
            line.className = 'log-line' + (color ? ' log-' + color : '');
            line.textContent = msg;
            logFrame.appendChild(line);
            logFrame.scrollTop = logFrame.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logFrame').innerHTML = '';
        }

        // 更新进度条
        function updateProgress(percent) {
            const fill = document.getElementById('progressFill');
            fill.style.width = percent + '%';
            fill.textContent = Math.round(percent) + '%';
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes >= 1048576) {
                return (bytes / 1048576).toFixed(2) + ' MB';
            } else if (bytes >= 1024) {
                return (bytes / 1024).toFixed(1) + ' KB';
            }
            return bytes + ' B';
        }
    </script>
</body>
</html>
