<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩工具 - 网页版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #4a90e2;
            color: white;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            height: 38px;
            display: flex;
            align-items: center;
        }
        .main-content { padding: 15px; }
        .mode-select { margin-bottom: 15px; }
        .mode-select label { margin-right: 20px; cursor: pointer; }
        
        .path-section { margin-bottom: 15px; }
        .path-label {
            display: inline-block;
            width: 80px;
            text-align: left;
            font-size: 13px;
            color: #333;
        }
        .path-input {
            width: 400px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
            background: #eaeaea;
            color: #333;
        }
        .btn-browse {
            padding: 5px 15px;
            background: #ddd;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
        }
        .btn-browse:hover { background: #ccc; }
        
        .preview-frame {
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 10px;
            margin-bottom: 15px;
            background: #f5f5f5;
        }
        .preview-title {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .preview-content {
            font-size: 12px;
            color: #999;
            white-space: pre-wrap;
        }
        .preview-content.has-info { color: #222; }
        
        .options-section { margin-bottom: 15px; }
        .options-row {
            margin-bottom: 10px;
            font-size: 13px;
            color: #333;
        }
        .options-row label { margin-right: 15px; cursor: pointer; }
        
        .btn-start {
            display: block;
            margin: 0 auto 15px;
            padding: 8px 30px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-start:hover { background: #3a7bc8; }
        .btn-start:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            margin-bottom: 15px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4a90e2;
            width: 0%;
            transition: width 0.3s;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 12px;
        }
        
        .log-frame {
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: "Consolas", monospace;
            font-size: 12px;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-line { margin: 0; padding: 1px 0; }
        .log-green { color: #6fd672; }
        .log-red { color: #f47c7c; }
        .log-yellow { color: #e5c07b; }
        .log-cyan { color: #56b6c2; }
        .log-magenta { color: #c678dd; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">图片压缩工具 - 网页版</div>
        <div class="main-content">
            <div class="mode-select">
                <label><input type="radio" name="mode" value="file" checked onchange="onModeChange()"> 单文件模式</label>
                <label><input type="radio" name="mode" value="folder" onchange="onModeChange()"> 批量文件夹模式</label>
            </div>

            <div class="path-section">
                <span class="path-label">输入路径:</span>
                <input type="text" class="path-input" id="inputPath" readonly placeholder="请选择文件或文件夹">
                <button class="btn-browse" onclick="browseInput()">浏览</button>
                <input type="file" id="fileInput" onchange="handleFileSelect(this)">
                <input type="file" id="folderInput" webkitdirectory onchange="handleFolderSelect(this)">
            </div>

            <div class="preview-frame">
                <div class="preview-title">图片信息</div>
                <div class="preview-content" id="previewContent">（请选择图片）</div>
            </div>

            <div class="options-section">
                <div class="options-row">
                    <span>输出格式:</span>
                    <label><input type="radio" name="format" value="auto" checked> 自动</label>
                    <label><input type="radio" name="format" value="jpg"> .jpg</label>
                    <label><input type="radio" name="format" value="png"> .png</label>
                    <label><input type="radio" name="format" value="webp"> .webp</label>
                </div>
                <div class="options-row">
                    <span>压缩模式:</span>
                    <label><input type="radio" name="mode2" value="clarity" checked> 优先清晰</label>
                    <label><input type="radio" name="mode2" value="size"> 优先压小</label>
                </div>
                <div class="options-row target-size">
                    <span>目标大小:</span>
                    <input type="range" class="size-slider" id="sizeSlider" min="10" max="5000" value="200" oninput="updateSizeDisplay()">
                    <input type="text" class="size-input" id="sizeInput" value="200" onchange="updateSizeFromInput()"> KB
                </div>
            </div>

            <button class="btn-start" id="btnStart" onclick="startCompress()">开始压缩</button>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>

            <div class="preview-title">压缩日志:</div>
            <div class="log-frame" id="logFrame"></div>
        </div>
    </div>

    <script>
        let selectedFiles = [];

        function onModeChange() {
            document.getElementById('inputPath').value = '';
            document.getElementById('previewContent').textContent = '（请选择图片）';
            document.getElementById('previewContent').className = 'preview-content';
            selectedFiles = [];
        }

        function browseInput() {
            const mode = document.querySelector('input[name="mode"]:checked').value;
            if (mode === 'file') {
                document.getElementById('fileInput').click();
            } else {
                document.getElementById('folderInput').click();
            }
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            if (!file) return;
            document.getElementById('inputPath').value = file.name;
            selectedFiles = [file];
            previewFile(file);
        }

        function handleFolderSelect(input) {
            const files = Array.from(input.files).filter(f => {
                const ext = '.' + f.name.split('.').pop().toLowerCase();
                return ['.jpg', '.jpeg', '.png', '.webp', '.bmp', '.tiff', '.tif'].includes(ext);
            });
            if (files.length === 0) {
                alert('未找到支持的图片文件！');
                return;
            }
            document.getElementById('inputPath').value = '已选择 ' + files.length + ' 个图片文件';
            selectedFiles = files;
            previewFolder(files);
        }

        function previewFile(file) {
            const img = new Image();
            img.onload = function() {
                const info = `文件名：${file.name}\n分辨率：${img.width} × ${img.height}  色彩模式：RGB\n文件大小：${formatSize(file.size)}`;
                const preview = document.getElementById('previewContent');
                preview.textContent = info;
                preview.className = 'preview-content has-info';
            };
            img.src = URL.createObjectURL(file);
        }

        function previewFolder(files) {
            let totalSize = 0;
            files.forEach(f => totalSize += f.size);
            const info = `图片数量：${files.length} 张\n总大小：${formatSize(totalSize)}\n输出到：浏览器下载目录`;
            const preview = document.getElementById('previewContent');
            preview.textContent = info;
            preview.className = 'preview-content has-info';
        }

        function updateSizeDisplay() {
            document.getElementById('sizeInput').value = document.getElementById('sizeSlider').value;
        }

        function updateSizeFromInput() {
            let value = parseInt(document.getElementById('sizeInput').value);
            if (isNaN(value) || value < 10) value = 10;
            if (value > 5000) value = 5000;
            document.getElementById('sizeInput').value = value;
            document.getElementById('sizeSlider').value = value;
        }

        async function startCompress() {
            if (selectedFiles.length === 0) {
                alert('请先选择文件或文件夹！');
                return;
            }

            const btnStart = document.getElementById('btnStart');
            btnStart.disabled = true;
            btnStart.textContent = '压缩中...';
            clearLog();
            updateProgress(0);

            const targetKB = parseInt(document.getElementById('sizeInput').value);
            const format = document.querySelector('input[name="format"]:checked').value;
            const mode = document.querySelector('input[name="mode2"]:checked').value;

            log(`共找到 ${selectedFiles.length} 张图片`, 'yellow');
            log(`目标大小：≤ ${targetKB} KB`, 'yellow');
            log(`输出格式：${format}    压缩模式：${mode}`, 'cyan');
            log(`输出目录：浏览器下载目录\n`, 'yellow');

            let ok = 0, fail = 0, skipped = 0;

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                log(`[${i + 1}/${selectedFiles.length}] 正在处理: ${file.name}`);

                try {
                    if (file.size / 1024 <= targetKB) {
                        log(`[跳过] ${file.name} 已满足目标大小（${formatSize(file.size)}）`, 'yellow');
                        skipped++;
                    } else {
                        const result = await compressImage(file, targetKB, format, mode);
                        ok++;
                        const ratio = ((1 - result.compressedSize / file.size) * 100).toFixed(1);
                        const tag = result.compressedSize <= targetKB * 1024 ? 'green' : 'yellow';
                        log(`[OK] ${file.name}  ${formatSize(file.size)} → ${formatSize(result.compressedSize)}  压缩率 ${ratio}%  (质量: ${result.quality})`, tag);
                        downloadFile(result.blob, result.fileName);
                    }
                } catch (error) {
                    fail++;
                    log(`[失败] ${file.name}  ${error.message}`, 'red');
                }

                updateProgress(((i + 1) / selectedFiles.length) * 100);
            }

            log(`\n完成！成功 ${ok} 张，失败 ${fail} 张，跳过 ${skipped} 张。`, 'yellow');
            btnStart.disabled = false;
            btnStart.textContent = '开始压缩';
        }

        // 将 canvas.toBlob 转换为 Promise
        function canvasToBlob(canvas, mimeType, quality) {
            return new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, mimeType, quality);
            });
        }

        async function compressImage(file, targetKB, format, mode) {
            // 1. 读取文件并创建图片
            const img = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(new Error('图片加载失败'));
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
            });

            // 2. 确定输出格式
            let mimeType = 'image/jpeg';
            let ext = '.jpg';

            if (format === 'auto') {
                const originalExt = '.' + file.name.split('.').pop().toLowerCase();
                if (originalExt === '.png' || originalExt === '.bmp') {
                    mimeType = 'image/jpeg';
                    ext = '.jpg';
                } else if (originalExt === '.webp') {
                    mimeType = 'image/webp';
                    ext = '.webp';
                }
            } else if (format === 'png') {
                mimeType = 'image/png';
                ext = '.png';
            } else if (format === 'webp') {
                mimeType = 'image/webp';
                ext = '.webp';
            }

            // 3. 创建 canvas 并绘制
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const targetBytes = targetKB * 1024;
            const fileName = file.name.replace(/\.[^.]+$/, '') + '_compressed' + ext;

            log(`  开始压缩：${formatSize(file.size)} → 目标 ${targetKB} KB`, 'magenta');
            log(`  [格式] ${ext}, MIME: ${mimeType}`, 'cyan');

            // 4. PNG 格式特殊处理（无损压缩，不支持 quality 参数）
            if (mimeType === 'image/png') {
                log(`  ⚠️ PNG格式为无损压缩，无法有效减小文件大小`, 'yellow');
                log(`  💡 提示：如需压缩文件大小，请选择 JPG 或 WebP 格式`, 'cyan');
                
                const blob = await canvasToBlob(canvas, mimeType, 1.0);
                
                if (!blob) {
                    throw new Error('PNG压缩失败');
                }
                
                log(`  ✓ PNG处理完成，大小 ${formatSize(blob.size)}`, 'green');
                return {
                    blob: blob,
                    compressedSize: blob.size,
                    fileName: fileName,
                    quality: '无损'
                };
            }

            // 5. JPG/WebP 格式支持 quality 参数，进行质量搜索
            let currentQuality = (mode === 'size') ? 0.7 : 0.95;
            let blob = await canvasToBlob(canvas, mimeType, currentQuality);
            
            if (!blob) {
                throw new Error('压缩失败：无法创建 blob');
            }

            log(`  质量 ${currentQuality.toFixed(2)} → ${(blob.size / 1024).toFixed(1)} KB`, 'magenta');

            let bestBlob = null;
            let bestQuality = currentQuality;

            if (blob.size <= targetBytes) {
                // 起始质量已满足要求，尝试更高质量（但不超过 0.95）
                bestBlob = blob;
                bestQuality = currentQuality;
                
                // 逐步增加质量，找到满足要求的最高值
                while (currentQuality < 0.95) {
                    currentQuality = Math.min(currentQuality + 0.05, 0.95);
                    const testBlob = await canvasToBlob(canvas, mimeType, currentQuality);
                    if (!testBlob || testBlob.size > targetBytes) {
                        break;
                    }
                    bestBlob = testBlob;
                    bestQuality = currentQuality;
                    log(`  质量 ${currentQuality.toFixed(2)} → ${(testBlob.size / 1024).toFixed(1)} KB ✓`, 'magenta');
                }
            } else {
                // 起始质量不满足，需要降低质量
                while (currentQuality > 0.1) {
                    currentQuality -= 0.05;
                    if (currentQuality < 0.1) currentQuality = 0.1;
                    
                    blob = await canvasToBlob(canvas, mimeType, currentQuality);
                    if (!blob) continue;
                    
                    log(`  质量 ${currentQuality.toFixed(2)} → ${(blob.size / 1024).toFixed(1)} KB`, 'magenta');
                    
                    if (blob.size <= targetBytes) {
                        bestBlob = blob;
                        bestQuality = currentQuality;
                        break;
                    }
                }
            }

            // 6. 返回结果
            if (bestBlob) {
                log(`  ✓ 最终质量 ${bestQuality.toFixed(2)}，大小 ${formatSize(bestBlob.size)}`, 'green');
                return {
                    blob: bestBlob,
                    compressedSize: bestBlob.size,
                    fileName: fileName,
                    quality: bestQuality.toFixed(2)
                };
            } else {
                // 使用最低质量
                blob = await canvasToBlob(canvas, mimeType, 0.1);
                if (!blob) {
                    throw new Error('压缩失败');
                }
                log(`  ✓ 使用最低质量 0.10，大小 ${formatSize(blob.size)}`, 'green');
                return {
                    blob: blob,
                    compressedSize: blob.size,
                    fileName: fileName,
                    quality: '0.10'
                };
            }
        }

        function downloadFile(blob, fileName) {
            log(`  [下载] ${fileName} (${formatSize(blob.size)})`, 'cyan');
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function log(msg, color = '') {
            const logFrame = document.getElementById('logFrame');
            const line = document.createElement('div');
            line.className = 'log-line' + (color ? ' log-' + color : '');
            line.textContent = msg;
            logFrame.appendChild(line);
            logFrame.scrollTop = logFrame.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logFrame').innerHTML = '';
        }

        function updateProgress(percent) {
            const fill = document.getElementById('progressFill');
            fill.style.width = percent + '%';
            fill.textContent = Math.round(percent) + '%';
        }

        function formatSize(bytes) {
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }
    </script>
</body>
</html>
